services:
  app:
    build: .
    container_name: ytdlp-web
    ports:
      - "8686:8686"
    volumes:
      - ./data:/data
      - ./media:/media
    environment:
      - YTDLP_DB_HOST=postgres
      - YTDLP_DB_PORT=5432
      - YTDLP_DB_NAME=ytdlp_web
      - YTDLP_DB_USER=ytdlp
      - YTDLP_DB_PASSWORD=ytdlp123
      - YTDLP_REDIS_HOST=redis
      - YTDLP_REDIS_PORT=6379
      - YTDLP_REDIS_DB=0
      - YTDLP_ADMIN_PASSWORD=admin123
      # Emby（可选）
      - YTDLP_EMBY_URL=${EMBY_URL:-}
      - YTDLP_EMBY_API_KEY=${EMBY_API_KEY:-}
      # 代理（可选）
      - YTDLP_PROXY=${PROXY:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # 如果复用已有 PostgreSQL，注释掉此服务，修改上方连接信息
  postgres:
    image: postgres:16-alpine
    container_name: ytdlp-postgres
    environment:
      - POSTGRES_DB=ytdlp_web
      - POSTGRES_USER=ytdlp
      - POSTGRES_PASSWORD=ytdlp123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytdlp -d ytdlp_web"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 如果复用已有 Redis，注释掉此服务
  redis:
    image: redis:7-alpine
    container_name: ytdlp-redis

volumes:
  pgdata:
